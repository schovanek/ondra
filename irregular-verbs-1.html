<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Irregular Verbs Practice - 1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <div class="verbs-list home-nav">
    <a class="pill" href="index.html">&#8962; Back to Home</a>
  </div>
  <h1>Irregular Verbs Practice – A to K</h1>
  <p class="subtitle">Type the past simple form. A verb is removed after 2 correct answers in a row.</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Remaining verbs</div>
      <div class="stat-value" id="remainingCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current streak</div>
      <div class="stat-value" id="currentStreak">0 / 2</div>
    </div>
    <div class="stat">
      <div class="stat-label">Correct in total</div>
      <div class="stat-value" id="totalCorrect">0</div>
    </div>
  </div>

  <div id="quizArea"></div>

  <div class="verbs-box">
    <h2>Remaining verbs</h2>
    <div class="verbs-list" id="verbsList"></div>
  </div>
</div>

<script>
  const initialItems = [
    { prompt: "are", answer: "were" },
    { prompt: "be", answer: "was" },
    { prompt: "bring", answer: "brought" },
    { prompt: "buy", answer: "bought" },
    { prompt: "can", answer: "could" },
    { prompt: "catch", answer: "caught" },
    { prompt: "choose", answer: "chose" },
    { prompt: "come", answer: "came" },
    { prompt: "do", answer: "did" },
    { prompt: "draw", answer: "drew" },
    { prompt: "drink", answer: "drank" },
    { prompt: "drive", answer: "drove" },
    { prompt: "eat", answer: "ate" },
    { prompt: "fall", answer: "fell" },
    { prompt: "find", answer: "found" },
    { prompt: "fly", answer: "flew" },
    { prompt: "get", answer: "got" },
    { prompt: "give", answer: "gave" },
    { prompt: "go", answer: "went" },
    { prompt: "have", answer: "had" },
    { prompt: "hide", answer: "hid" },
    { prompt: "hit", answer: "hit" },
    { prompt: "hold", answer: "held" },
    { prompt: "hurt", answer: "hurt" },
    { prompt: "know", answer: "knew" },
  ];
</script>
<script src="practice.js"></script>
</body>
</html>
