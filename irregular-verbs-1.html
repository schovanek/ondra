<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Irregular Verbs Practice - 1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <div class="verbs-list home-nav">
    <a class="pill" href="index.html">&#8962; Back to Home</a>
  </div>
  <h1>Irregular Verbs Practice – A to K</h1>
  <p class="subtitle">Type the past simple form. A verb is removed after 2 correct answers in a row.</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Remaining verbs</div>
      <div class="stat-value" id="remainingCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current streak</div>
      <div class="stat-value" id="currentStreak">0 / 2</div>
    </div>
    <div class="stat">
      <div class="stat-label">Correct in total</div>
      <div class="stat-value" id="totalCorrect">0</div>
    </div>
  </div>

  <div id="quizArea"></div>

  <div class="verbs-box">
    <h2>Remaining verbs</h2>
    <div class="verbs-list" id="verbsList"></div>
  </div>
</div>

<script>
  const initialItems = [
    { prompt: "are (jsou)", answer: "were" },
    { prompt: "be (být)", answer: "was" },
    { prompt: "bring (přinést)", answer: "brought" },
    { prompt: "buy (koupit)", answer: "bought" },
    { prompt: "can (moci)", answer: "could" },
    { prompt: "catch (chytit)", answer: "caught" },
    { prompt: "choose (vybrat)", answer: "chose" },
    { prompt: "come (přijít)", answer: "came" },
    { prompt: "do (dělat)", answer: "did" },
    { prompt: "draw (kreslit)", answer: "drew" },
    { prompt: "drink (pít)", answer: "drank" },
    { prompt: "drive (řídit)", answer: "drove" },
    { prompt: "eat (jíst)", answer: "ate" },
    { prompt: "fall (spadnout)", answer: "fell" },
    { prompt: "find (najít)", answer: "found" },
    { prompt: "fly (letět)", answer: "flew" },
    { prompt: "get (dostat)", answer: "got" },
    { prompt: "give (dát)", answer: "gave" },
    { prompt: "go (jít)", answer: "went" },
    { prompt: "have (mít)", answer: "had" },
    { prompt: "hide (schovat)", answer: "hid" },
    { prompt: "hit (udeřit)", answer: "hit" },
    { prompt: "hold (držet)", answer: "held" },
    { prompt: "hurt (zranit)", answer: "hurt" },
    { prompt: "know (vědět)", answer: "knew" },
  ];
</script>
<script src="practice.js"></script>
</body>
</html>
