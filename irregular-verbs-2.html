<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Irregular Verbs Practice - 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <div class="verbs-list home-nav">
    <a class="pill" href="index.html">&#8962; Back to Home</a>
  </div>
  <h1>Irregular Verbs Practice – L to Z</h1>
  <p class="subtitle">Type the past simple form. A verb is removed after 2 correct answers in a row.</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Remaining verbs</div>
      <div class="stat-value" id="remainingCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current streak</div>
      <div class="stat-value" id="currentStreak">0 / 2</div>
    </div>
    <div class="stat">
      <div class="stat-label">Correct in total</div>
      <div class="stat-value" id="totalCorrect">0</div>
    </div>
  </div>

  <div id="quizArea"></div>

  <div class="verbs-box">
    <h2>Remaining verbs</h2>
    <div class="verbs-list" id="verbsList"></div>
  </div>
</div>

<script>
  const initialItems = [
    { prompt: "learn (učit se)", answer: "learnt" },
    { prompt: "lose (ztratit)", answer: "lost" },
    { prompt: "make (udělat)", answer: "made" },
    { prompt: "mean (znamenat)", answer: "meant" },
    { prompt: "need to (muset)", answer: "had to" },
    { prompt: "put (položit)", answer: "put" },
    { prompt: "put on (obléct si)", answer: "put on" },
    { prompt: "read (číst)", answer: "read" },
    { prompt: "ride (jet)", answer: "rode" },
    { prompt: "run (běžet)", answer: "ran" },
    { prompt: "say (říct)", answer: "said" },
    { prompt: "see (vidět)", answer: "saw" },
    { prompt: "sing (zpívat)", answer: "sang" },
    { prompt: "sit (sedět)", answer: "sat" },
    { prompt: "sleep (spát)", answer: "slept" },
    { prompt: "spell (hláskovat)", answer: "spelt" },
    { prompt: "stand (stát)", answer: "stood" },
    { prompt: "swim (plavat)", answer: "swam" },
    { prompt: "take (vzít)", answer: "took" },
    { prompt: "tell (říct)", answer: "told" },
    { prompt: "think (myslet)", answer: "thought" },
    { prompt: "throw (hodit)", answer: "threw" },
    { prompt: "understand (rozumět)", answer: "understood" },
    { prompt: "wake up (vzbudit se)", answer: "woke up" },
    { prompt: "wear (nosit)", answer: "wore" },
    { prompt: "write (psát)", answer: "wrote" },
  ];
</script>
<script src="practice.js"></script>
</body>
</html>
