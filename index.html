<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Irregular Verbs Practice</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --ok-bg: #ecfdf3;
      --ok-text: #166534;
      --bad-bg: #fef2f2;
      --bad-text: #991b1b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fafcff;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .prompt-label {
      color: var(--muted);
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .verb {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .answer-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 240px;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .secondary:hover {
      background: #d1d5db;
    }

    .message {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: 600;
      display: none;
      white-space: pre-line;
    }

    .message.show { display: block; }
    .message.success { background: var(--ok-bg); color: var(--ok-text); }
    .message.error { background: var(--bad-bg); color: var(--bad-text); }

    .verbs-box {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .verbs-box h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .verbs-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fafcff;
      font-size: 0.95rem;
    }

    .completed {
      text-align: center;
      padding: 18px;
      border-radius: 14px;
      background: var(--ok-bg);
      color: var(--ok-text);
      font-weight: bold;
      font-size: 1.1rem;
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .app {
        padding: 18px;
      }

      .verb {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Irregular Verbs Practice</h1>
  <p class="subtitle">Type the past simple form. A verb is removed after 2 correct answers in a row.</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Remaining verbs</div>
      <div class="stat-value" id="remainingCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Current streak</div>
      <div class="stat-value" id="currentStreak">0 / 2</div>
    </div>
    <div class="stat">
      <div class="stat-label">Correct in total</div>
      <div class="stat-value" id="totalCorrect">0</div>
    </div>
  </div>

  <div id="quizArea"></div>

  <div class="verbs-box">
    <h2>Remaining verbs</h2>
    <div class="verbs-list" id="verbsList"></div>
  </div>
</div>

<script>
  const initialVerbs = [
    { infinitive: "be", pastSimple: "was" },
    { infinitive: "are", pastSimple: "were" },
    { infinitive: "can", pastSimple: "could" },
    { infinitive: "do", pastSimple: "did" },
    { infinitive: "drink", pastSimple: "drank" },
    { infinitive: "eat", pastSimple: "ate" },
    { infinitive: "give", pastSimple: "gave" },
    { infinitive: "go", pastSimple: "went" },
    { infinitive: "have", pastSimple: "had" },
    { infinitive: "know", pastSimple: "knew" },
    { infinitive: "must", pastSimple: "had to" },
    { infinitive: "read", pastSimple: "read" },
    { infinitive: "run", pastSimple: "ran" },
    { infinitive: "see", pastSimple: "saw" },
    { infinitive: "take", pastSimple: "took" }
  ];

  let verbs = initialVerbs.map((verb, index) => ({
    id: index + 1,
    infinitive: verb.infinitive,
    pastSimple: verb.pastSimple,
    streak: 0
  }));

  let currentVerb = null;
  let totalCorrect = 0;

  const remainingCountEl = document.getElementById('remainingCount');
  const currentStreakEl = document.getElementById('currentStreak');
  const totalCorrectEl = document.getElementById('totalCorrect');
  const quizAreaEl = document.getElementById('quizArea');
  const verbsListEl = document.getElementById('verbsList');

  function normalizeText(value) {
    return value
            .toLowerCase()
            .trim()
            .replace(/\s+/g, ' ');
  }

  function acceptedAnswers(pastSimple) {
    return pastSimple
            .split(',')
            .map(item => normalizeText(item));
  }

  function pickRandomVerb() {
    if (verbs.length === 0) {
      currentVerb = null;
      render();
      return;
    }

    const randomIndex = Math.floor(Math.random() * verbs.length);
    currentVerb = verbs[randomIndex];
    render();

    const input = document.getElementById('answerInput');
    if (input) {
      input.focus();
    }
  }

  function checkAnswer() {
    const input = document.getElementById('answerInput');
    const userAnswer = normalizeText(input.value);

    if (!userAnswer) {
      showMessage('Please enter an answer.', 'error');
      return;
    }

    const validAnswers = acceptedAnswers(currentVerb.pastSimple);
    const isCorrect = validAnswers.includes(userAnswer);

    if (isCorrect) {
      currentVerb.streak += 1;
      totalCorrect += 1;

      if (currentVerb.streak >= 2) {
        const removedVerb = currentVerb.infinitive;
        verbs = verbs.filter(verb => verb.id !== currentVerb.id);
        showMessage('Correct. "' + removedVerb + '" is learned and removed from the list.', 'success');
        updateStats(0);
        renderVerbsList();
        setTimeout(pickRandomVerb, 700);
        return;
      }

      showMessage('Correct. One more correct answer in a row removes this verb from the list.', 'success');
      updateStats(currentVerb.streak);
      setTimeout(pickRandomVerb, 700);
    } else {
      currentVerb.streak = 0;
      showMessage('Wrong. Correct answer: ' + currentVerb.pastSimple, 'error');
      updateStats(currentVerb.streak);
      input.value = '';
      input.disabled = true;

      const checkButton = document.getElementById('checkButton');
      const skipButton = document.getElementById('skipButton');
      if (checkButton) checkButton.disabled = true;
      if (skipButton) skipButton.disabled = true;

      setTimeout(() => {
        pickRandomVerb();
      }, 3000);
    }

    totalCorrectEl.textContent = totalCorrect;
    remainingCountEl.textContent = verbs.length;
    renderVerbsList();
  }

  function showMessage(text, type) {
    const message = document.getElementById('message');
    if (!message) return;
    message.textContent = text;
    message.className = 'message show ' + type;
  }

  function updateStats(streak) {
    remainingCountEl.textContent = verbs.length;
    currentStreakEl.textContent = streak + ' / 2';
    totalCorrectEl.textContent = totalCorrect;
  }

  function resetApp() {
    verbs = initialVerbs.map((verb, index) => ({
      id: index + 1,
      infinitive: verb.infinitive,
      pastSimple: verb.pastSimple,
      streak: 0
    }));
    totalCorrect = 0;
    currentVerb = null;
    pickRandomVerb();
  }

  function renderVerbsList() {
    verbsListEl.innerHTML = '';
    verbs.forEach(verb => {
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.textContent = verb.infinitive;
      verbsListEl.appendChild(pill);
    });
  }

  function render() {
    updateStats(currentVerb ? currentVerb.streak : 0);
    renderVerbsList();

    if (!currentVerb && verbs.length === 0) {
      quizAreaEl.innerHTML = `
          <div class="completed">All selected verbs are learned.</div>
          <div style="margin-top: 16px; text-align: center;">
            <button onclick="resetApp()">Start again</button>
          </div>
        `;
      return;
    }

    quizAreaEl.innerHTML = `
        <div class="card">
          <div class="prompt-label">Write the past simple for:</div>
          <div class="verb">${currentVerb.infinitive}</div>

          <div class="answer-row">
            <input id="answerInput" type="text" placeholder="Type the past simple" autocomplete="off" />
            <button id="checkButton">Check</button>
            <button class="secondary" id="skipButton" type="button">Skip</button>
          </div>

          <div id="message" class="message"></div>
        </div>
      `;

    const input = document.getElementById('answerInput');
    const checkButton = document.getElementById('checkButton');
    const skipButton = document.getElementById('skipButton');

    checkButton.addEventListener('click', checkAnswer);
    skipButton.addEventListener('click', pickRandomVerb);
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        checkAnswer();
      }
    });
  }

  pickRandomVerb();
</script>
</body>
</html>
